name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Code parser tests
        run: node --test lib/ai/code-parser.test.ts

      - name: Agent mode routing
        run: npx tsx scripts/verify-agent-mode-routing.ts

      - name: OpenRouter routing
        run: npx tsx scripts/verify-openrouter-routing.ts
