# nginx.conf — LifemarkAI production
# Place at: /etc/nginx/sites-available/lifemarkai
# Enable:   ln -s /etc/nginx/sites-available/lifemarkai /etc/nginx/sites-enabled/
# Reload:   nginx -t && systemctl reload nginx

upstream nextjs {
    server 127.0.0.1:3000;
    keepalive 64;
}

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name lifemarkai.com www.lifemarkai.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name lifemarkai.com www.lifemarkai.com;

    # ── TLS (replace with your cert paths from Certbot / Let's Encrypt) ────
    ssl_certificate     /etc/letsencrypt/live/lifemarkai.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lifemarkai.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Gzip compression ────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_min_length 1000;
    gzip_vary on;

    # ── Global request limits ───────────────────────────────────────────────
    client_max_body_size 30M;          # allow audio uploads (Whisper max 25MB)
    client_body_timeout 30s;
    client_header_timeout 10s;

    # ── Static Next.js assets — served directly, no proxy needed ───────────
    location /_next/static/ {
        alias /var/www/lifemarkai/.next/static/;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    location /favicon.ico {
        alias /var/www/lifemarkai/public/favicon.ico;
        expires 30d;
        access_log off;
    }

    location /public/ {
        alias /var/www/lifemarkai/public/;
        expires 30d;
        access_log off;
    }

    # ── Stripe webhook — raw body required, no buffering ───────────────────
    location /api/billing/webhook {
        proxy_pass         http://nextjs;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_request_buffering off;   # CRITICAL — Stripe needs raw body for sig verification
    }

    # ── AI streaming endpoints — long read timeout for SSE ─────────────────
    location ~ ^/api/ai/(chat|agent|plan|fix) {
        proxy_pass              http://nextjs;
        proxy_http_version      1.1;
        proxy_set_header        Upgrade $http_upgrade;
        proxy_set_header        Connection '';        # keep-alive for SSE
        proxy_set_header        Host $host;
        proxy_set_header        X-Real-IP $remote_addr;
        proxy_set_header        X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;
        proxy_read_timeout      130s;   # agent maxDuration=120s + 10s buffer
        proxy_send_timeout      130s;
        proxy_buffering         off;    # CRITICAL — flush SSE chunks immediately
        proxy_cache             off;
        chunked_transfer_encoding on;
        # Prevent nginx from closing SSE connections on empty lines
        proxy_ignore_headers    "Cache-Control" "Expires";
    }

    # ── Deployment endpoint — can take up to 90s (Netlify poll) ────────────
    location /api/deploy {
        proxy_pass         http://nextjs;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 95s;
        proxy_send_timeout 95s;
    }

    # ── All other routes ────────────────────────────────────────────────────
    location / {
        proxy_pass         http://nextjs;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
        proxy_cache_bypass $http_upgrade;
    }

    # ── Basic DDoS / abuse mitigation ───────────────────────────────────────
    # (Add rate_limit zones in nginx.conf http block if needed:)
    # limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;
    # Then: limit_req zone=api burst=20 nodelay;
}
